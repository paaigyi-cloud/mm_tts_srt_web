    <style>
        /* Mobile တွင် Scroll ဆွဲရလွယ်ကူစေရန် ပြင်ဆင်ထားသော Flexbox Design */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #161623; 
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column; /* အပေါ်အောက် စီရန် */
            overflow: hidden; /* ပင်မစာမျက်နှာကို ငြိမ်နေစေရန် */
        }
        
        .ad-banner {
            width: 100%;
            text-align: center;
            background-color: #212133;
            color: #aaa;
            padding: 5px 0;
            min-height: 50px;
            box-sizing: border-box;
            flex-shrink: 0; /* ကြော်ငြာနေရာကို ကျုံ့မသွားစေရန် */
            z-index: 10;
        }
        
        /* Iframe ကို Mobile တွင် ညက်ညောစွာ Scroll ဆွဲနိုင်ရန် */
        .iframe-container {
            flex-grow: 1; /* ကျန်တဲ့နေရာလွတ်အားလုံးကို ယူရန် */
            width: 100%;
            overflow-y: auto; /* အပေါ်အောက် Scroll ဆွဲခွင့်ပေးရန် */
            -webkit-overflow-scrolling: touch; /* iPhone/Android များတွင် Smooth Scroll ဖြစ်စေရန် (အရေးကြီးဆုံး) */
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="ad-banner" id="top-ad">

    </div>

    <div class="iframe-container">
